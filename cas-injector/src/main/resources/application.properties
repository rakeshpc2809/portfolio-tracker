spring.application.name=portfolio-tracker
spring.threads.virtual.enabled=true


# 🛰️ Docker-Specific DB Connection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cas_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# 📑 Google Sheets Strategy Config
google.sheet.url=${GOOGLE_SHEET_URL:http://localhost/dummy}

# 🛡️ Security Config
portfolio.api.key=${PORTFOLIO_API_KEY:dev-secret-key}

# 🛣️ Add a Context Path (Optional but recommended for Nginx cleanliness)
server.servlet.context-path=/api
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
server.port=8080

spring.jpa.properties.hibernate.default_batch_fetch_size=20
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# 🚀 Actuator & Ops
management.endpoints.web.exposure.include=health,info,metrics,caches
management.endpoint.health.show-details=when_authorized
management.endpoint.caches.enabled=true
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# 📝 File Logging
logging.file.name=logs/portfolio-os.log
# Keep logs for 30 days and max file size 10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.max-file-size=10MB

# 🧠 Regime Intelligence (Phase 3)
hmm.enabled=true
cas.parser.url=${CAS_PARSER_URL:http://python-parser:8000}

# 📊 HRP Allocation (Phase 4)
hrp.blend.ratio=0.5

# 🕵️ Observability & Tracing
management.tracing.sampling.probability=0.0
logging.pattern.level=%5p [${spring.application.name:}]

# 🤝 Sahamati Account Aggregator (AA) Integration
fiu.id=portfolio-os-fiu
fiu.sandbox.mode=true
fiu.aa.base.url=${FIU_AA_URL:https://sandbox.setu.co/aa}
fiu.client.api.key=${FIU_API_KEY:sandbox-api-key}
fiu.client.client.id=${FIU_CLIENT_ID:sandbox-client-id}
fiu.callback.url=${FIU_CALLBACK_URL:http://localhost:8080/api/callback}

server {
    listen 80;
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy requests to the Python Quant engine
    location /api/v1/quant/ {
        proxy_pass http://quant-engine:8001/api/v1/quant/;
    }

    # Proxy API requests to the Java backend to avoid CORS issues in production
    location /api/ {
        proxy_pass http://java-backend:8080/api/; # Ensure the trailing slashes match
    }

    # Proxy requests to the Python parser service
    location /parser/ {
        proxy_pass http://python-parser:8000/;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
}
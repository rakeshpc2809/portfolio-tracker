server {
    listen 80;
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Java backend to avoid CORS issues in production
    location /api/ {
    proxy_pass http://java-backend:8080/api/; # Ensure the trailing slashes match
}
}
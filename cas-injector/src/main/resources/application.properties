spring.application.name=portfolio-tracker

# 🛰️ Docker-Specific DB Connection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cas_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# 📑 Google Sheets Strategy Config
google.sheet.url=${GOOGLE_SHEET_URL}

# 🛡️ Security Config
portfolio.api.key=${PORTFOLIO_API_KEY}

# 🛣️ Add a Context Path (Optional but recommended for Nginx cleanliness)
server.servlet.context-path=/api
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
server.port=8080

spring.jpa.properties.hibernate.default_batch_fetch_size=20
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# 🚀 Actuator & Ops
management.endpoints.web.exposure.include=health,info,metrics,caches
management.endpoint.health.show-details=when_authorized
management.endpoint.caches.enabled=true
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# 📝 File Logging
logging.file.name=logs/portfolio-os.log
# Keep logs for 30 days and max file size 10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.max-file-size=10MB

# 🧠 Regime Intelligence (Phase 3)
hmm.enabled=true
casparser.url=http://python-parser:8000

# 📊 HRP Allocation (Phase 4)
hrp.blend.ratio=0.5

# 📡 Event-Driven Architecture (Kafka)
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=cas-injector-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# 🕵️ Observability & Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

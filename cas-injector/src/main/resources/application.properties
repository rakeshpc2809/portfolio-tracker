spring.application.name=portfolio-tracker

# 🛰️ Docker-Specific DB Connection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cas_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# 📑 Google Sheets Strategy Config
google.sheet.url=${GOOGLE_SHEET_URL:https://docs.google.com/spreadsheets/d/e/2PACX-1vTq7bqtww_gsZv4FPXBWErHOSmuPSNrnL-82cno8rShNP9TsTOjJmkPBnocg_GqSWALUQo9YEI_dyto/pub?gid=412111003&single=true&output=csv}

# 🛡️ Security Config
portfolio.api.key=${PORTFOLIO_API_KEY:dev-secret-key}

# 🛣️ Add a Context Path (Optional but recommended for Nginx cleanliness)
server.servlet.context-path=/api
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# SAFETY: 'validate' not 'update' — schema mutations are handled by @PostConstruct DDL only.
# Never use 'update' in production: it can silently drop columns that Hibernate thinks are orphaned.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
server.port=8080

spring.jpa.properties.hibernate.default_batch_fetch_size=20
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# 🚀 Actuator & Ops
management.endpoints.web.exposure.include=health,info,metrics,caches
management.endpoint.health.show-details=when_authorized
management.endpoint.caches.enabled=true
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# 📝 File Logging
logging.file.name=logs/portfolio-os.log
# Keep logs for 30 days and max file size 10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.max-file-size=10MB

# 🧠 Regime Intelligence (Phase 3)
hmm.enabled=true
casparser.url=http://python-parser:8000

# 📊 HRP Allocation (Phase 4)
hrp.blend.ratio=0.5
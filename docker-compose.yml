version: '3.8'

services:
  # 1. The Database
  postgres:
    image: postgres:16-alpine
    container_name: cas_postgres
    environment:
      - POSTGRES_USER=${DB_USER:-user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-cas_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. The Java Backend
  java-backend:
    build: ./cas-injector
    container_name: cas_java_app
    depends_on:
      - postgres
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DB_NAME:-cas_db}
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-user}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-password}
      - GOOGLE_SHEET_URL=${GOOGLE_SHEET_URL:-https://docs.google.com/spreadsheets/d/e/2PACX-1vTq7bqtww_gsZv4FPXBWErHOSmuPSNrnL-82cno8rShNP9TsTOjJmkPBnocg_GqSWALUQo9YEI_dyto/pub?gid=412111003&single=true&output=csv}
      - PORTFOLIO_API_KEY=${PORTFOLIO_API_KEY:-dev-secret-key}
      - OLLAMA_URL=http://host.docker.internal:11434
      - AI_MODEL=phi3.5
      - CAS_PARSER_URL=http://python-parser:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 3. The Python Parser
  python-parser:
    build: ./cas-parser
    container_name: cas_python_app
    ports:
      - "8000:8000"
    environment:
      - JAVA_BACKEND_URL=http://java-backend:8080/api
      - PORTFOLIO_API_KEY=${PORTFOLIO_API_KEY:-dev-secret-key}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-cas_db}
      - DB_USER=${DB_USER:-user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - OLLAMA_URL=http://host.docker.internal:11434
      - AI_MODEL=phi3.5
    depends_on:
      - java-backend
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 4. The React Frontend
  react-frontend:
    build:
      context: ./portfolio-dashboard
      args:
        - VITE_API_KEY=${PORTFOLIO_API_KEY:-dev-secret-key}
    container_name: cas_react_ui
    ports:
      - "80:80"
    depends_on:
      - java-backend
    restart: always

  # 5. The Python Quant Engine
  quant-engine:
    build: ./cas-parser/quant-engine
    container_name: cas_quant_engine
    ports:
      - "8001:8001"
    environment:
      - JAVA_BACKEND_URL=http://java-backend:8080/api
      - PORTFOLIO_API_KEY=${PORTFOLIO_API_KEY:-dev-secret-key}
    depends_on:
      - java-backend

volumes:
  postgres_data:

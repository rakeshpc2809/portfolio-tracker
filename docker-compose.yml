# Create a .env file to override these defaults in production
# .env should contain:
# DB_PASSWORD=your_secure_password
# GOOGLE_SHEET_URL=your_csv_url
# PORTFOLIO_API_KEY=your_secure_api_key

services:
  postgres:
    image: postgres:16-alpine
    container_name: cas_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-cas_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-cas_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # 2. The Java Backend
  java-backend:
    build:
      context: .
      dockerfile: cas-injector/Dockerfile
    container_name: cas_java_app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DB_NAME:-cas_db}
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-user}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-password}
      - GOOGLE_SHEET_URL=${GOOGLE_SHEET_URL:-https://docs.google.com/spreadsheets/d/e/2PACX-1vTq7bqtww_gsZv4FPXBWErHOSmuPSNrnL-82cno8rShNP9TsTOjJmkPBnocg_GqSWALUQo9YEI_dyto/pub?gid=412111003&single=true&output=csv}
      - PORTFOLIO_API_KEY=${PORTFOLIO_API_KEY:-dev-secret-key}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s

  # 3. The Python Parser
  python-parser:
    build: ./cas-parser
    container_name: cas_python_app
    ports:
      - "8000:8000"
    environment:
      - JAVA_BACKEND_URL=http://java-backend:8080/api/cas/inject
      - PORTFOLIO_API_KEY=${PORTFOLIO_API_KEY:-dev-secret-key}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      java-backend:
        condition: service_healthy
      kafka:
        condition: service_started

  # 4. The React Frontend
  react-frontend:
    build:
      context: ./portfolio-dashboard
      args:
        - VITE_API_KEY=${PORTFOLIO_API_KEY:-dev-secret-key}
    container_name: cas_react_ui
    ports:
      - "80:80"
    depends_on:
      java-backend:
        condition: service_healthy
    restart: always

  # 5. Infrastructure: Kafka & Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cas_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cas_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # 6. Observability: Zipkin
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: cas_zipkin
    ports:
      - "9411:9411"

volumes:
  postgres_data:
